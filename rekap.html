<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekapitulasi Nilai Murid</title>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 40px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #007bff; color: white; padding: 12px; text-transform: uppercase; font-size: 13px; }
        td { padding: 10px; border: 1px solid #dee2e6; text-align: center; font-size: 14px; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #e9ecef; }

        /* Pewarnaan Skor Otomatis */
        .skor { font-weight: bold; border-radius: 4px; padding: 2px 8px; }
        .skor-A { color: #2ecc71; background: #eafaf1; }
        .skor-B { color: #3498db; background: #ebf5fb; }
        .skor-C { color: #f1c40f; background: #fef9e7; }
        .skor-D { color: #e67e22; background: #fdf5e6; }
        .skor-E { color: #e74c3c; background: #fdedec; }

        td:nth-child(2) {
    color: #666;
    font-size: 12px;
    font-style: italic;
}

        /* Pengaturan khusus untuk layar HP (lebar di bawah 600px) */
@media screen and (max-width: 600px) {
    body { 
        margin: 10px; /* Perkecil margin agar ruang lebih luas */
    }
    .container { 
        padding: 15px; 
    }
    th, td { 
        padding: 8px; 
        font-size: 12px; /* Perkecil font agar muat banyak kolom */
    }
    h1 { 
        font-size: 18px; 
    }
    button {
        width: 100%; /* Tombol jadi selebar layar agar mudah diklik jempol */
    }
}

        @media print {
    /* Sembunyikan tombol cetak di hasil PDF */
    button { display: none; }
    
    /* Atur agar margin kertas pas */
    body { margin: 10mm; background-color: white; }
    
    .container { 
        box-shadow: none; 
        padding: 0; 
        width: 100%; 
    }

    /* Pastikan warna skor (A-E) tetap muncul di PDF */
    .skor {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
}

        .button-group {
    display: flex;            /* Mengaktifkan mode Flexbox */
    justify-content: center;  /* Membuat tombol berada di tengah secara horizontal */
    gap: 15px;               /* Memberi jarak antar tombol agar tidak dempet */
    margin-bottom: 20px;     /* Memberi jarak bawah ke tabel */
    
}

        /* Warna khusus Tombol Simpan */
.btn-back {
    background-color: #28a745;
    color: white;
}
.btn-back:hover { background-color: #218838; }

/* Warna khusus Tombol Rekap */
.btn-print {
    background-color: #6c757d;
    color: white;
}
.btn-print:hover { background-color: #5a6268; }


/* Pengaturan khusus untuk HP agar tombol bertumpuk ke bawah jika layar sempit */
@media screen and (max-width: 600px) {
    .button-group {
        flex-direction: column; /* Mengubah sejajar samping menjadi sejajar atas-bawah */
        align-items: center;    /* Mengetengahkan tombol di layar HP */
    }
    
    .button-group button {
        width: 100%;            /* Membuat tombol selebar layar HP */
    }
}

    </style>
</head>
<body>
    <div class="container" style="overflow-x: auto;">
        <div style="margin-bottom: 20px; text-align: center;">
    <label>Pilih Tanggal Evaluasi: </label>
    <input type="date" id="filterTanggal" onchange="filterData()">
</div>
        <h1>REKAPITULASI PERKEMBANGAN TOLIBAT</h1>
        <div id="loading" style="text-align: center;">Mengambil data dari pusat...</div>
        <div id="konten-tabel"></div>

        <div class="button-group">
    <button onclick="window.location.href='index.html'" class="btn-back">← Kembali</button>
    <button onclick="cetakRekap()" class="btn-print">Cetak Laporan PDF</button>
</div>

    </div>

    <script>
        const urlAsisten = "https://script.google.com/macros/s/AKfycbyoK4wrE3FoaR7d8way08iEh82IVF69Maov5mmIzCe7MAe-9Wi4wrv0Y7qynjUQMLNk/exec";

function cetakRekap() {
    // Sembunyikan tombol saat mencetak agar tidak ikut muncul di PDF
    window.print();
}

        window.onload = function() {
    fetch(urlAsisten)
    .then(res => res.json())
    .then(data => {
        document.getElementById('loading').style.display = 'none';
        
        // 1. Tambahkan Header "Tanggal" di sebelah Nama Murid
        let html = '<table><thead><tr><th>Nama Murid</th><th>Tanggal</th>';
        data.materi.forEach(m => { html += `<th>${m}</th>`; });
        html += '</tr></thead><tbody>';

        data.hasil.forEach(row => {
            // 2. Format Tanggal agar lebih rapi (menghilangkan jam yang terlalu panjang)
            let tglMentah = row.tanggal || "-";
            let tglFormat = tglMentah !== "-" ? new Date(tglMentah).toLocaleDateString('id-ID') : "-";

            html += `<tr>
                <td style="text-align: left; font-weight: bold;">${row.nama}</td>
                <td>${tglFormat}</td>`; // Menampilkan Tanggal
            
            data.materi.forEach(m => {
                let skor = row[m.toLowerCase()] || "-";
                let warnaClass = (skor !== "-") ? `skor-${skor}` : "";
                html += `<td><span class="skor ${warnaClass}">${skor}</span></td>`;
            });
            html += '</tr>';
        });

        

        html += '</tbody></table>';
        document.getElementById('konten-tabel').innerHTML = html;
    });
};
    </script>
</body>
</html>
