<!DOCTYPE html>
<html>
<head>
    <title>TRACK RECORD PERKEMBANGAN TOLIBAT BIMBEL DINIYYAH</title>
    <style>
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        margin: 40px; 
        background-color: #f9f9f9; 
    }
    
    table { 
        width: 100%; 
        border-collapse: collapse; 
        background: white;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* Efek bayangan biar modern */
    }
    
    th, td { 
        padding: 15px; 
        border-bottom: 1px solid #eee;
        text-align: left; /* Tambahkan baris ini agar semuanya sejajar di kiri */
    }

    /* Mengatur agar kolom pertama (Nama) selalu punya lebar minimal */
    td:first-child, th:first-child {
        min-width: 150px;
    }

    /* Mengatur agar kolom centang berada di tengah agar lebih rapi */
    td:not(:first-child), th:not(:first-child) {
        text-align: center;
    }
    
    /* Efek saat baris disorot kursor */
    tr:hover { background-color: #f1f7ff; }
    
    /* Memperbesar kotak centang */
    input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
    }

    button { 
        margin-top: 20px; 
        padding: 12px 25px; 
        background-color: #28a745; /* Warna hijau */
        color: white;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        background-color: #218838; /* Hijau lebih gelap saat disentuh */
    }

    /* Container untuk membungkus A-E agar berjajar ke samping */
.skor-container {
    display: flex;
    justify-content: space-around;
    min-width: 120px;
}

/* Mengatur label (huruf A-E) dan inputnya agar vertikal */
.skor-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 10px; /* Ukuran huruf kecil seperti di gambar */
}

.skor-item input {
    margin: 2px 0 0 0;
    cursor: pointer;
}
</style>
</head>
<body>

    <h2>Nama Guru: Saidah, B.A</h2>

    <table>
        <thead>
        <tr><!-- Akan diisi otomatis oleh JS --></tr>
    </thead>
    <tbody>
        <!-- Akan diisi otomatis oleh JS -->
    </tbody>
    </table>

    <button onclick="simpanData()">Simpan Evaluasi</button>

   <script>
    const urlAsisten = "https://script.google.com/macros/s/AKfycbw-o-Tmh43hWadbbI-xMtZIDG2ajtEV02b0co5TMxM5Zsr3h4W1VWrTeaQtYrYKw-0G/exec";
    let daftarMateriGlobal = []; // Menyimpan daftar materi agar bisa diakses fungsi simpan

    // 1. FUNGSI MENGAMBIL DATA (Saat Web Dibuka)
    window.onload = function() {
        fetch(urlAsisten)
        .then(res => res.json())
        .then(data => {
            daftarMateriGlobal = data.materi; // Simpan materi untuk nanti
            const theadRow = document.querySelector("thead tr");
            const tbody = document.querySelector("tbody");

            // Buat Header Kolom Otomatis
            theadRow.innerHTML = "<th>Nama Murid</th>";
            data.materi.forEach(m => {
                theadRow.innerHTML += `<th>${m}</th>`;
            });

            // Buat Baris Murid Otomatis dengan Opsi A, B, C, D, E
            data.murid.forEach(nama => {
                let barisHTML = `<td>${nama}</td>`;
                
                data.materi.forEach(m => {
                    // ID Grup harus unik per murid dan materi
                    let grupID = `grup-${nama.replace(/\s/g, '')}-${m.replace(/\s/g, '')}`; 
                    
                    barisHTML += `<td>
                        <div class="skor-container">
                            ${['A','B','C','D','E'].map(huruf => `
                                <div class="skor-item">
                                    <span>${huruf}</span>
                                    <input type="radio" name="${grupID}" value="${huruf}" data-materi="${m}">
                                </div>
                            `).join('')}
                        </div>
                    </td>`;
                });
                tbody.innerHTML += `<tr>${barisHTML}</tr>`;
            });
        })
        .catch(err => console.error("Gagal mengambil data:", err));
    };

    // 2. FUNGSI SIMPAN DATA
    function simpanData() {
        let baris = document.querySelectorAll("tbody tr");
        let laporanSemuaMurid = [];

        baris.forEach((row) => {
            let nama = row.cells[0].innerText;
            let dataMurid = { nama: nama };

            // Ambil nilai Radio Button yang dipilih
            daftarMateriGlobal.forEach(m => {
                let pilihan = row.querySelector(`input[data-materi="${m}"]:checked`);
                dataMurid[m.toLowerCase()] = pilihan ? pilihan.value : "-"; 
            });

            laporanSemuaMurid.push(dataMurid);
        });

        console.log("Mengirim Data:", laporanSemuaMurid);

        fetch(urlAsisten, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(laporanSemuaMurid)
        })
        .then(() => alert("Data berhasil dikirim ke Google Sheets!"))
        .catch(err => alert("Gagal mengirim data: " + err));
    }
</script>

</body>
</html>
